<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gear Manifest</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: #0e0e0e; color: #f0ede8; min-height: 100vh; -webkit-text-size-adjust: 100%; }

  /* AUTH */
  #auth-screen { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2rem; padding: 2rem; }
  .logo { font-size: 12px; letter-spacing: 0.2em; text-transform: uppercase; color: #888; }
  .app-title { font-size: clamp(2rem, 8vw, 2.8rem); font-weight: 700; letter-spacing: -0.04em; color: #f0ede8; text-align: center; }
  .app-title span { color: #e8b84b; }
  .sign-in-btn { display: flex; align-items: center; gap: 12px; background: #f0ede8; color: #0e0e0e; border: none; border-radius: 8px; padding: 14px 28px; font-size: 15px; font-weight: 600; cursor: pointer; transition: opacity 0.2s; touch-action: manipulation; }
  .sign-in-btn:active { opacity: 0.75; }
  .sign-in-btn svg { width: 20px; height: 20px; flex-shrink: 0; }

  /* APP SHELL */
  #app { display: none; min-height: 100vh; }

  header { display: flex; align-items: center; justify-content: space-between; padding: 0.75rem 1rem; border-bottom: 1px solid #1e1e1e; position: sticky; top: 0; z-index: 10; background: #0e0e0e; gap: 8px; }
  .header-title { font-size: 0.9rem; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; color: #e8b84b; flex-shrink: 0; }
  .user-info { display: flex; align-items: center; gap: 8px; min-width: 0; }
  .user-avatar { width: 28px; height: 28px; border-radius: 50%; object-fit: cover; border: 2px solid #2a2a2a; flex-shrink: 0; }
  .user-name { font-size: 12px; color: #888; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 80px; }
  .sign-out-btn { font-size: 11px; color: #555; background: none; border: 1px solid #2a2a2a; border-radius: 6px; padding: 4px 8px; cursor: pointer; flex-shrink: 0; touch-action: manipulation; }

  /* TABS */
  .tabs { display: flex; border-bottom: 1px solid #1e1e1e; background: #0e0e0e; position: sticky; top: 53px; z-index: 9; }
  .tab-btn { flex: 1; font-size: 13px; font-weight: 600; padding: 12px; border: none; background: none; color: #555; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.15s; touch-action: manipulation; }
  .tab-btn.active { color: #e8b84b; border-bottom-color: #e8b84b; }

  /* MAIN */
  .main { padding: 1rem; max-width: 960px; margin: 0 auto; }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* STATS */
  .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 1rem; }
  .stat-card { border-radius: 10px; padding: 0.75rem 0.5rem; text-align: center; cursor: pointer; touch-action: manipulation; transition: opacity 0.15s; }
  .stat-card:active { opacity: 0.75; }
  .stat-num { font-size: clamp(1.4rem, 6vw, 2rem); font-weight: 700; line-height: 1; }
  .stat-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; margin-top: 3px; }

  /* TOOLBAR */
  .toolbar { display: flex; gap: 8px; margin-bottom: 0.75rem; align-items: center; }
  .search-wrap { flex: 1; position: relative; }
  .search-wrap svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); width: 14px; height: 14px; color: #555; pointer-events: none; }
  .search-input { width: 100%; background: #161616; border: 1px solid #2a2a2a; border-radius: 8px; padding: 10px 10px 10px 32px; font-size: 16px; color: #f0ede8; outline: none; font-family: inherit; -webkit-appearance: none; }
  .search-input::placeholder { color: #444; }
  .search-input:focus { border-color: #e8b84b55; }
  .add-btn { display: flex; align-items: center; gap: 5px; background: #e8b84b; color: #0e0e0e; border: none; border-radius: 7px; padding: 10px 14px; font-size: 13px; font-weight: 700; cursor: pointer; white-space: nowrap; touch-action: manipulation; flex-shrink: 0; }
  .add-btn:active { opacity: 0.75; }

  /* FILTER ROW */
  .filter-row { display: flex; gap: 6px; margin-bottom: 0.75rem; overflow-x: auto; -webkit-overflow-scrolling: touch; padding-bottom: 4px; scrollbar-width: none; }
  .filter-row::-webkit-scrollbar { display: none; }
  .filter-btn { font-size: 12px; padding: 6px 12px; border-radius: 20px; border: 1px solid #2a2a2a; background: none; color: #888; cursor: pointer; white-space: nowrap; flex-shrink: 0; touch-action: manipulation; }
  .filter-btn.active { background: #2a2a2a; color: #f0ede8; border-color: #444; }

  .result-count { font-size: 11px; color: #444; margin-bottom: 6px; }

  /* GEAR LIST — mobile cards */
  .gear-list { display: flex; flex-direction: column; gap: 1px; background: #1a1a1a; border: 1px solid #1e1e1e; border-radius: 12px; overflow: hidden; }

  .gear-item {
    display: flex; align-items: center; gap: 10px;
    padding: 12px;
    background: #0e0e0e;
    transition: background 0.1s;
  }
  .gear-item:active { background: #141414; }

  .gear-item-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .gear-item-dot.available { background: #3a7d5a; }
  .gear-item-dot.out { background: #e8b84b; }

  .gear-item-main { flex: 1; min-width: 0; }
  .gear-item-name { font-size: 14px; font-weight: 600; color: #f0ede8; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .gear-item-meta { display: flex; align-items: center; gap: 6px; margin-top: 2px; flex-wrap: wrap; }
  .gear-item-cat { font-size: 11px; color: #555; }
  .gear-item-sep { font-size: 11px; color: #333; }
  .gear-item-who { font-size: 11px; font-weight: 600; }
  .gear-item-who.out { color: #e8b84b; }
  .gear-item-who.available { color: #3a7d5a; }
  .gear-item-time { font-size: 10px; color: #3a3a3a; margin-top: 1px; }

  .gear-item-actions { display: flex; gap: 5px; flex-shrink: 0; }
  .row-btn { font-size: 12px; font-weight: 600; padding: 7px 11px; border-radius: 7px; border: 1px solid #2a2a2a; background: none; cursor: pointer; transition: all 0.12s; white-space: nowrap; touch-action: manipulation; min-height: 36px; }
  .row-btn.take { color: #e8b84b; border-color: #e8b84b44; }
  .row-btn.take:active { background: #2b2010; }
  .row-btn.return { color: #5acc8e; border-color: #3a7d5a44; }
  .row-btn.return:active { background: #0d2b1e; }
  .row-btn.del { color: #664444; border-color: #2a1515; font-size: 13px; padding: 7px 10px; }
  .row-btn.del:active { background: #1e0f0f; color: #a05555; }

  /* Desktop table view */
  @media (min-width: 700px) {
    header { padding: 1rem 1.5rem; }
    .user-name { max-width: 160px; }
    .tabs { top: 61px; }
    .tab-btn { flex: none; padding: 12px 24px; }
    .main { padding: 1.5rem; }
    .stats-row { gap: 12px; margin-bottom: 1.5rem; }
    .stat-card { padding: 1rem; }
    .stat-label { font-size: 11px; }
    .filter-row { flex-wrap: wrap; overflow-x: visible; padding-bottom: 0; }

    .gear-list { gap: 0; }
    .gear-list-header {
      display: grid;
      grid-template-columns: 20px 1fr 120px 80px 180px 90px;
      gap: 12px; padding: 8px 14px;
      background: #111; border-bottom: 1px solid #1e1e1e;
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.12em; color: #444; align-items: center;
    }
    .gear-item {
      display: grid;
      grid-template-columns: 20px 1fr 120px 80px 180px 90px;
      gap: 12px; padding: 10px 14px; align-items: center;
      border-bottom: 1px solid #141414;
    }
    .gear-item:last-child { border-bottom: none; }
    .gear-item-dot { margin: 0 auto; }
    .gear-item-main { display: contents; }
    .gear-item-name { font-size: 14px; }
    .gear-item-meta { display: contents; }
    .gear-item-cat { font-size: 11px; color: #555; }
    .gear-item-sep { display: none; }
    .gear-item-who { font-size: 12px; }
    .gear-item-time { font-size: 11px; color: #3a3a3a; margin-top: 0; }
    .gear-item-actions { justify-content: flex-end; }
  }

  .empty-state { text-align: center; padding: 3rem 1rem; color: #444; }
  .empty-state p { font-size: 14px; margin-top: 8px; }

  /* CREW TAB */
  .crew-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; margin-bottom: 1.5rem; }
  .crew-card { background: #161616; border: 1px solid #1e1e1e; border-radius: 12px; padding: 1.1rem 0.75rem; text-align: center; cursor: pointer; transition: all 0.15s; touch-action: manipulation; }
  .crew-card:active { opacity: 0.75; }
  .crew-card.selected { border-color: #e8b84b; background: #1a1800; }
  .crew-avatar { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 700; margin: 0 auto 8px; }
  .crew-name-label { font-size: 13px; font-weight: 600; color: #f0ede8; }
  .crew-count { font-size: 11px; color: #555; margin-top: 2px; }
  .crew-count.has-gear { color: #e8b84b; }

  .crew-detail { display: none; border-top: 1px solid #1e1e1e; padding-top: 1.25rem; margin-top: 0.25rem; }
  .crew-detail.visible { display: block; }
  .crew-detail-header { display: flex; align-items: center; gap: 12px; margin-bottom: 1rem; }
  .crew-detail-avatar { width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; flex-shrink: 0; }
  .crew-detail-name { font-size: 17px; font-weight: 700; color: #f0ede8; }
  .crew-detail-sub { font-size: 12px; color: #555; }
  .crew-gear-list { display: flex; flex-direction: column; gap: 8px; }
  .crew-gear-item { background: #161616; border: 1px solid #1e1e1e; border-left: 3px solid #e8b84b; border-radius: 10px; padding: 10px 12px; display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
  .crew-gear-item-name { font-size: 13px; font-weight: 600; color: #f0ede8; }
  .crew-gear-item-cat { font-size: 11px; color: #555; margin-top: 2px; }
  .crew-gear-item-time { font-size: 11px; color: #444; text-align: right; white-space: nowrap; flex-shrink: 0; }
  .no-gear { text-align: center; padding: 2rem; color: #444; font-size: 14px; }

  /* MODAL */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: flex; align-items: flex-end; justify-content: center; z-index: 100; padding: 0; }
  .modal { background: #161616; border: 1px solid #2a2a2a; border-radius: 18px 18px 0 0; padding: 1.5rem; width: 100%; max-width: 480px; padding-bottom: max(1.5rem, env(safe-area-inset-bottom)); }
  .modal h3 { font-size: 16px; font-weight: 700; margin-bottom: 1.25rem; color: #f0ede8; }
  .form-group { margin-bottom: 1rem; }
  .form-group label { display: block; font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: #666; margin-bottom: 6px; }
  .form-group input, .form-group select { width: 100%; background: #0e0e0e; border: 1px solid #2a2a2a; border-radius: 9px; padding: 13px 12px; font-size: 16px; color: #f0ede8; outline: none; font-family: inherit; -webkit-appearance: none; }
  .form-group input:focus, .form-group select:focus { border-color: #e8b84b88; }
  .form-group select option { background: #161616; }
  .modal-actions { display: flex; gap: 8px; margin-top: 1.25rem; }
  .modal-cancel { flex: 1; background: #1e1e1e; border: none; color: #888; border-radius: 9px; padding: 13px; cursor: pointer; font-size: 15px; font-family: inherit; touch-action: manipulation; }
  .modal-confirm { flex: 2; background: #e8b84b; border: none; color: #0e0e0e; border-radius: 9px; padding: 13px; cursor: pointer; font-size: 15px; font-weight: 700; font-family: inherit; touch-action: manipulation; }
  .modal-confirm:active { opacity: 0.85; }

  @media (min-width: 700px) {
    .modal-overlay { align-items: center; padding: 1rem; }
    .modal { border-radius: 14px; padding-bottom: 1.5rem; }
  }

  .loading { display: flex; align-items: center; justify-content: center; min-height: 160px; color: #555; font-size: 14px; }
</style>
</head>
<body>

<div id="auth-screen">
  <div style="text-align:center">
    <div class="logo">Camera Crew</div>
    <div class="app-title">Gear <span>Manifest</span></div>
  </div>
  <button class="sign-in-btn" id="sign-in-btn">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
      <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
      <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
      <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
    </svg>
    Sign in with Google
  </button>
</div>

<div id="app">
  <header>
    <div class="header-title">⬡ Gear Manifest</div>
    <div class="user-info">
      <img class="user-avatar" id="user-avatar" src="" alt="">
      <span class="user-name" id="user-name"></span>
      <button class="sign-out-btn" id="sign-out-btn">Out</button>
    </div>
  </header>

  <div class="tabs">
    <button class="tab-btn active" id="tab-btn-gear">Gear</button>
    <button class="tab-btn" id="tab-btn-crew">Crew</button>
  </div>

  <div class="main">

    <!-- GEAR TAB -->
    <div id="tab-gear" class="tab-panel active">
      <div class="stats-row">
        <div class="stat-card" id="stat-card-all" style="background:#1a1f2e;border:1px solid #2a3a5c">
          <div class="stat-num" style="color:#7aacf0" id="stat-total">0</div>
          <div class="stat-label" style="color:#4a6a9a">Total</div>
        </div>
        <div class="stat-card" id="stat-card-available" style="background:#0d2b1e;border:1px solid #1a4a32">
          <div class="stat-num" style="color:#5acc8e" id="stat-available">0</div>
          <div class="stat-label" style="color:#2a6a4a">Available</div>
        </div>
        <div class="stat-card" id="stat-card-out" style="background:#2b1f0a;border:1px solid #4a3510">
          <div class="stat-num" style="color:#e8b84b" id="stat-out">0</div>
          <div class="stat-label" style="color:#7a5a20">Out</div>
        </div>
      </div>

      <div class="toolbar">
        <div class="search-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input class="search-input" id="search-input" type="search" placeholder="Search equipment...">
        </div>
        <button class="add-btn" id="open-add-btn">+ Add</button>
      </div>

      <div class="filter-row" id="filter-row"></div>
      <div class="result-count" id="result-count"></div>

      <div id="gear-container"><div class="loading">Loading gear...</div></div>
    </div>

    <!-- CREW TAB -->
    <div id="tab-crew" class="tab-panel">
      <div style="font-size:11px;text-transform:uppercase;letter-spacing:0.15em;color:#555;margin-bottom:1rem">Crew Members</div>
      <div class="crew-grid" id="crew-grid"></div>
      <div class="crew-detail" id="crew-detail">
        <div class="crew-detail-header">
          <div class="crew-detail-avatar" id="crew-detail-avatar"></div>
          <div>
            <div class="crew-detail-name" id="crew-detail-name"></div>
            <div class="crew-detail-sub" id="crew-detail-sub"></div>
          </div>
        </div>
        <div class="crew-gear-list" id="crew-gear-list"></div>
      </div>
    </div>

  </div>
</div>

<!-- Add Modal -->
<div id="add-modal" class="modal-overlay" style="display:none">
  <div class="modal">
    <h3>Add Gear Item</h3>
    <div class="form-group">
      <label>Item Name</label>
      <input type="text" id="gear-name-input" placeholder="e.g. Sony A7 III, 50mm f/1.8">
    </div>
    <div class="form-group">
      <label>Category</label>
      <select id="gear-cat-input">
        <option>Camera Bodies</option>
        <option>Lenses</option>
        <option>Lighting</option>
        <option>Stands &amp; Supports</option>
        <option>Flash</option>
        <option>Batteries</option>
        <option>Cards</option>
        <option>Bags</option>
        <option>Other</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="modal-cancel" id="add-cancel-btn">Cancel</button>
      <button class="modal-confirm" id="add-confirm-btn">Add Item</button>
    </div>
  </div>
</div>

<!-- Take Modal -->
<div id="take-modal" class="modal-overlay" style="display:none">
  <div class="modal">
    <h3>Check Out Gear</h3>
    <p style="font-size:14px;color:#888;margin-bottom:1.25rem" id="take-item-name"></p>
    <div class="form-group">
      <label>Who's taking it?</label>
      <select id="take-name-input">
        <option value="">— select crew member —</option>
        <option>Azhar</option>
        <option>Nithees</option>
        <option>Marcus</option>
        <option>Farz</option>
        <option>Dawson</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="modal-cancel" id="take-cancel-btn">Cancel</button>
      <button class="modal-confirm" id="take-confirm-btn">Check Out</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/firebase@10.12.2/firebase-app-compat.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/firebase@10.12.2/firebase-auth-compat.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/firebase@10.12.2/firebase-database-compat.min.js"></script>
<script>
firebase.initializeApp({
  apiKey: "AIzaSyAPnYK0aXhdRY_d8farvKqw_i2lOO_5lK8",
  authDomain: "gear-manifest-v2.firebaseapp.com",
  databaseURL: "https://gear-manifest-v2-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "gear-manifest-v2",
  storageBucket: "gear-manifest-v2.firebasestorage.app",
  messagingSenderId: "366870494705",
  appId: "1:366870494705:web:6167d14e290c019869d850"
});

const auth = firebase.auth();
const db = firebase.database();

const CREW = [
  { name: 'Azhar',   color: '#1a2b3c', text: '#4a9edd', initials: 'AZ' },
  { name: 'Nithees', color: '#1a2b1a', text: '#5acc8e', initials: 'NI' },
  { name: 'Marcus',  color: '#2b1a1a', text: '#e87b4b', initials: 'MA' },
  { name: 'Farz',    color: '#2b2010', text: '#e8b84b', initials: 'FA' },
  { name: 'Dawson',  color: '#1e1a2b', text: '#a78bda', initials: 'DA' },
];

const FILTERS = [
  { label: 'All', val: 'all' },
  { label: 'Available', val: 'available' },
  { label: 'Checked Out', val: 'checked-out' },
  { label: 'Bodies', val: 'Camera Bodies' },
  { label: 'Lenses', val: 'Lenses' },
  { label: 'Lighting', val: 'Lighting' },
  { label: 'Stands', val: 'Stands & Supports' },
  { label: 'Flash', val: 'Flash' },
  { label: 'Batteries', val: 'Batteries' },
  { label: 'Cards', val: 'Cards' },
  { label: 'Bags', val: 'Bags' },
  { label: 'Other', val: 'Other' },
];

let currentFilter = 'all';
let searchQuery = '';
let allGear = {};
let pendingTakeId = null;
let selectedCrew = null;
const isDesktop = () => window.innerWidth >= 700;

// Build filter row
const filterRow = document.getElementById('filter-row');
FILTERS.forEach(f => {
  const btn = document.createElement('button');
  btn.className = 'filter-btn' + (f.val === 'all' ? ' active' : '');
  btn.textContent = f.label;
  btn.addEventListener('click', () => {
    currentFilter = f.val;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderGear();
  });
  filterRow.appendChild(btn);
});

// Stat card clicks
document.getElementById('stat-card-all').addEventListener('click', () => applyFilter('all'));
document.getElementById('stat-card-available').addEventListener('click', () => applyFilter('available'));
document.getElementById('stat-card-out').addEventListener('click', () => applyFilter('checked-out'));

function applyFilter(val) {
  currentFilter = val;
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.classList.toggle('active',
      (b.textContent === 'All' && val === 'all') ||
      (b.textContent === 'Available' && val === 'available') ||
      (b.textContent === 'Checked Out' && val === 'checked-out')
    );
  });
  renderGear();
}

// Search
document.getElementById('search-input').addEventListener('input', function() {
  searchQuery = this.value.toLowerCase().trim();
  renderGear();
});

// Auth
document.getElementById('sign-in-btn').addEventListener('click', () => {
  auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()).catch(e => alert(e.message));
});
document.getElementById('sign-out-btn').addEventListener('click', () => auth.signOut());

auth.onAuthStateChanged(user => {
  if (user) {
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    document.getElementById('user-name').textContent = user.displayName ? user.displayName.split(' ')[0] : user.email;
    document.getElementById('user-avatar').src = user.photoURL || '';
    listenGear();
  } else {
    document.getElementById('auth-screen').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
  }
});

// Tabs
document.getElementById('tab-btn-gear').addEventListener('click', function() { switchTab('gear', this); });
document.getElementById('tab-btn-crew').addEventListener('click', function() { switchTab('crew', this); });
function switchTab(tab, btn) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  btn.classList.add('active');
}

// Modals
document.getElementById('open-add-btn').addEventListener('click', () => {
  document.getElementById('add-modal').style.display = 'flex';
  setTimeout(() => document.getElementById('gear-name-input').focus(), 100);
});
document.getElementById('add-cancel-btn').addEventListener('click', closeModals);
document.getElementById('take-cancel-btn').addEventListener('click', closeModals);
document.getElementById('add-modal').addEventListener('click', e => { if (e.target === e.currentTarget) closeModals(); });
document.getElementById('take-modal').addEventListener('click', e => { if (e.target === e.currentTarget) closeModals(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModals(); });

document.getElementById('add-confirm-btn').addEventListener('click', () => {
  const name = document.getElementById('gear-name-input').value.trim();
  const category = document.getElementById('gear-cat-input').value;
  if (!name) return;
  db.ref('gear').push({ name, category, checkedOutBy: null, addedAt: Date.now() });
  document.getElementById('gear-name-input').value = '';
  closeModals();
});

document.getElementById('take-confirm-btn').addEventListener('click', () => {
  const who = document.getElementById('take-name-input').value;
  if (!who || !pendingTakeId) return;
  db.ref('gear/' + pendingTakeId).update({ checkedOutBy: who, checkedOutAt: Date.now(), returnedAt: null });
  pendingTakeId = null;
  closeModals();
});

function closeModals() {
  document.getElementById('add-modal').style.display = 'none';
  document.getElementById('take-modal').style.display = 'none';
}

// Data
function listenGear() {
  db.ref('gear').on('value', snap => {
    allGear = snap.val() || {};
    renderGear();
    renderCrew();
  });
}

function formatShort(ts) {
  if (!ts) return '—';
  return new Date(ts).toLocaleString('en-SG', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit', hour12: true });
}
function formatFull(ts) {
  if (!ts) return '—';
  return new Date(ts).toLocaleString('en-SG', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit', hour12: true });
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderGear() {
  const container = document.getElementById('gear-container');
  const items = Object.entries(allGear);

  let filtered = items;
  if (currentFilter === 'available') filtered = items.filter(([,v]) => !v.checkedOutBy);
  else if (currentFilter === 'checked-out') filtered = items.filter(([,v]) => v.checkedOutBy);
  else if (!['all','available','checked-out'].includes(currentFilter)) {
    filtered = items.filter(([,v]) => v.category === currentFilter);
  }

  if (searchQuery) {
    filtered = filtered.filter(([,v]) =>
      v.name.toLowerCase().includes(searchQuery) ||
      v.category.toLowerCase().includes(searchQuery) ||
      (v.checkedOutBy && v.checkedOutBy.toLowerCase().includes(searchQuery))
    );
  }

  const total = items.length;
  const available = items.filter(([,v]) => !v.checkedOutBy).length;
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-available').textContent = available;
  document.getElementById('stat-out').textContent = total - available;

  const rc = document.getElementById('result-count');
  rc.textContent = (searchQuery || currentFilter !== 'all') ? filtered.length + ' item' + (filtered.length !== 1 ? 's' : '') + ' shown' : '';

  if (filtered.length === 0) {
    container.innerHTML = '<div class="empty-state"><div style="font-size:2rem">📷</div><p>' + (total === 0 ? 'No gear yet. Tap + Add to start!' : 'Nothing matches.') + '</p></div>';
    return;
  }

  filtered.sort(([,a],[,b]) => {
    if (!!a.checkedOutBy !== !!b.checkedOutBy) return a.checkedOutBy ? -1 : 1;
    return a.name.localeCompare(b.name);
  });

  const desktop = isDesktop();

  let html = '<div class="gear-list">';
  if (desktop) {
    html += `<div class="gear-list-header">
      <div></div><div>Name</div><div>Category</div><div>Status</div><div>With / Time</div><div></div>
    </div>`;
  }

  filtered.forEach(([id, item]) => {
    const out = !!item.checkedOutBy;
    const whoTime = out
      ? esc(item.checkedOutBy) + ' · ' + formatShort(item.checkedOutAt)
      : (item.returnedAt ? 'Ret ' + formatShort(item.returnedAt) : '—');

    html += `<div class="gear-item" data-id="${id}">
      <div class="gear-item-dot ${out ? 'out' : 'available'}"></div>
      <div class="gear-item-main">
        <div class="gear-item-name">${esc(item.name)}</div>
        <div class="gear-item-meta">
          <span class="gear-item-cat">${esc(item.category)}</span>
          <span class="gear-item-sep">·</span>
          <span class="gear-item-who ${out ? 'out' : 'available'}">${out ? esc(item.checkedOutBy) : 'Available'}</span>
        </div>
        <div class="gear-item-time">${out ? 'Taken: ' + formatShort(item.checkedOutAt) : (item.returnedAt ? 'Returned: ' + formatShort(item.returnedAt) : '')}</div>
      </div>
      ${desktop ? `<div class="gear-item-cat">${esc(item.category)}</div>
      <div style="font-size:12px;color:${out ? '#e8b84b' : '#3a7d5a'}">${out ? 'Out' : 'Available'}</div>
      <div style="font-size:11px;color:#555">${whoTime}</div>` : ''}
      <div class="gear-item-actions">
        ${out
          ? `<button class="row-btn return" data-id="${id}">Return</button>`
          : `<button class="row-btn take" data-id="${id}" data-name="${esc(item.name)}">Take</button>`
        }
        <button class="row-btn del" data-id="${id}">✕</button>
      </div>
    </div>`;
  });

  html += '</div>';
  container.innerHTML = html;

  container.querySelectorAll('.row-btn.take').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      pendingTakeId = btn.dataset.id;
      document.getElementById('take-item-name').textContent = btn.dataset.name;
      document.getElementById('take-name-input').value = '';
      document.getElementById('take-modal').style.display = 'flex';
    });
  });
  container.querySelectorAll('.row-btn.return').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      db.ref('gear/' + btn.dataset.id).update({ checkedOutBy: null, checkedOutAt: null, returnedAt: Date.now() });
    });
  });
  container.querySelectorAll('.row-btn.del').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      if (confirm('Remove this item?')) db.ref('gear/' + btn.dataset.id).remove();
    });
  });
}

window.addEventListener('resize', renderGear);

function renderCrew() {
  const items = Object.entries(allGear);
  const crewGrid = document.getElementById('crew-grid');
  crewGrid.innerHTML = CREW.map(c => {
    const held = items.filter(([,v]) => v.checkedOutBy === c.name);
    return `<div class="crew-card ${selectedCrew === c.name ? 'selected' : ''}" data-crew="${c.name}">
      <div class="crew-avatar" style="background:${c.color};color:${c.text}">${c.initials}</div>
      <div class="crew-name-label">${c.name}</div>
      <div class="crew-count ${held.length > 0 ? 'has-gear' : ''}">${held.length} item${held.length !== 1 ? 's' : ''}</div>
    </div>`;
  }).join('');

  crewGrid.querySelectorAll('.crew-card').forEach(card => {
    card.addEventListener('click', () => {
      const name = card.dataset.crew;
      selectedCrew = selectedCrew === name ? null : name;
      renderCrew();
      if (!selectedCrew) document.getElementById('crew-detail').classList.remove('visible');
    });
  });
  if (selectedCrew) showCrewDetail(selectedCrew);
}

function showCrewDetail(name) {
  const c = CREW.find(x => x.name === name);
  const items = Object.entries(allGear).filter(([,v]) => v.checkedOutBy === name);
  const av = document.getElementById('crew-detail-avatar');
  av.style.background = c.color; av.style.color = c.text; av.textContent = c.initials;
  document.getElementById('crew-detail-name').textContent = name;
  document.getElementById('crew-detail-sub').textContent = items.length + ' item' + (items.length !== 1 ? 's' : '') + ' checked out';
  const list = document.getElementById('crew-gear-list');
  list.innerHTML = items.length === 0
    ? '<div class="no-gear">Nothing with ' + name + ' right now</div>'
    : items.map(([,item]) => `
      <div class="crew-gear-item">
        <div>
          <div class="crew-gear-item-name">${esc(item.name)}</div>
          <div class="crew-gear-item-cat">${esc(item.category)}</div>
        </div>
        <div class="crew-gear-item-time">${formatFull(item.checkedOutAt)}</div>
      </div>`).join('');
  document.getElementById('crew-detail').classList.add('visible');
}
</script>
</body>
</html>
