<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gear Manifest</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: #0e0e0e; color: #f0ede8; min-height: 100vh; }

  #auth-screen {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2rem;
    background: #0e0e0e;
  }
  .logo { font-size: 13px; letter-spacing: 0.2em; text-transform: uppercase; color: #888; }
  .app-title { font-size: 2.8rem; font-weight: 700; letter-spacing: -0.04em; color: #f0ede8; }
  .app-title span { color: #e8b84b; }
  .sign-in-btn {
    display: flex; align-items: center; gap: 12px;
    background: #f0ede8; color: #0e0e0e;
    border: none; border-radius: 8px;
    padding: 14px 28px; font-size: 15px; font-weight: 600;
    cursor: pointer; transition: opacity 0.2s;
  }
  .sign-in-btn:hover { opacity: 0.88; }
  .sign-in-btn svg { width: 20px; height: 20px; }

  #app { display: none; min-height: 100vh; }

  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 1rem 1.5rem;
    border-bottom: 1px solid #1e1e1e;
    position: sticky; top: 0; z-index: 10;
    background: #0e0e0e;
  }
  .header-left { display: flex; align-items: center; gap: 1rem; }
  .header-title { font-size: 1rem; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; color: #e8b84b; }
  .user-info { display: flex; align-items: center; gap: 10px; }
  .user-avatar { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; border: 2px solid #2a2a2a; }
  .user-name { font-size: 13px; color: #888; }
  .sign-out-btn { font-size: 12px; color: #555; background: none; border: 1px solid #2a2a2a; border-radius: 6px; padding: 4px 10px; cursor: pointer; }
  .sign-out-btn:hover { color: #f0ede8; border-color: #444; }

  .main { padding: 1.5rem; max-width: 900px; margin: 0 auto; }

  .stats-row {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 1.5rem;
  }
  .stat-card {
    background: #161616; border: 1px solid #1e1e1e; border-radius: 10px;
    padding: 1rem; text-align: center;
  }
  .stat-num { font-size: 2rem; font-weight: 700; color: #e8b84b; }
  .stat-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: #555; margin-top: 2px; }

  .section-header {
    display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem;
  }
  .section-title { font-size: 11px; text-transform: uppercase; letter-spacing: 0.15em; color: #555; }

  .add-btn {
    display: flex; align-items: center; gap: 6px;
    background: #e8b84b; color: #0e0e0e; border: none;
    border-radius: 7px; padding: 8px 14px; font-size: 13px; font-weight: 600;
    cursor: pointer; transition: opacity 0.15s;
  }
  .add-btn:hover { opacity: 0.85; }

  .filter-row { display: flex; gap: 8px; margin-bottom: 1rem; flex-wrap: wrap; }
  .filter-btn {
    font-size: 12px; padding: 5px 12px; border-radius: 6px;
    border: 1px solid #2a2a2a; background: none; color: #888; cursor: pointer;
    transition: all 0.15s;
  }
  .filter-btn.active { background: #1e1e1e; color: #f0ede8; border-color: #444; }

  .gear-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 12px; }

  .gear-card {
    background: #161616; border: 1px solid #1e1e1e; border-radius: 12px;
    padding: 1rem; transition: border-color 0.15s;
  }
  .gear-card:hover { border-color: #2a2a2a; }
  .gear-card.checked-out { border-left: 3px solid #e8b84b; }
  .gear-card.available { border-left: 3px solid #3a7d5a; }

  .gear-card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
  .gear-name { font-size: 15px; font-weight: 600; color: #f0ede8; line-height: 1.3; }
  .gear-cat {
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em;
    padding: 3px 8px; border-radius: 4px; background: #1e1e1e; color: #666;
    white-space: nowrap;
  }
  .gear-status { margin-top: 8px; }
  .status-badge {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 12px; font-weight: 600; padding: 4px 10px; border-radius: 6px;
  }
  .status-badge.available { background: #0d2b1e; color: #5acc8e; }
  .status-badge.checked-out { background: #2b2010; color: #e8b84b; }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

  .with-who { font-size: 12px; color: #666; margin-top: 6px; }
  .with-who strong { color: #aaa; }

  .gear-actions { display: flex; gap: 6px; margin-top: 12px; }
  .action-btn {
    flex: 1; font-size: 12px; font-weight: 600; padding: 7px;
    border-radius: 6px; border: 1px solid #2a2a2a; background: none;
    color: #888; cursor: pointer; transition: all 0.15s;
  }
  .action-btn:hover { background: #1e1e1e; color: #f0ede8; }
  .action-btn.take { border-color: #e8b84b44; color: #e8b84b; }
  .action-btn.take:hover { background: #2b2010; }
  .action-btn.return { border-color: #3a7d5a44; color: #5acc8e; }
  .action-btn.return:hover { background: #0d2b1e; }
  .action-btn.del { border-color: #3a1515; color: #a05555; }
  .action-btn.del:hover { background: #1e0f0f; }

  .empty-state { text-align: center; padding: 3rem; color: #444; grid-column: 1/-1; }
  .empty-state p { font-size: 14px; margin-top: 8px; }

  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.75);
    display: flex; align-items: center; justify-content: center;
    z-index: 100; padding: 1rem;
  }
  .modal {
    background: #161616; border: 1px solid #2a2a2a; border-radius: 14px;
    padding: 1.5rem; width: 100%; max-width: 400px;
  }
  .modal h3 { font-size: 16px; font-weight: 600; margin-bottom: 1.25rem; color: #f0ede8; }
  .form-group { margin-bottom: 1rem; }
  .form-group label { display: block; font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: #666; margin-bottom: 6px; }
  .form-group input, .form-group select {
    width: 100%; background: #0e0e0e; border: 1px solid #2a2a2a;
    border-radius: 7px; padding: 10px 12px; font-size: 14px; color: #f0ede8;
    outline: none;
  }
  .form-group input:focus, .form-group select:focus { border-color: #e8b84b55; }
  .form-group select option { background: #161616; }
  .modal-actions { display: flex; gap: 8px; margin-top: 1.25rem; }
  .modal-cancel { flex: 1; background: none; border: 1px solid #2a2a2a; color: #888; border-radius: 7px; padding: 10px; cursor: pointer; font-size: 14px; }
  .modal-cancel:hover { color: #f0ede8; }
  .modal-confirm { flex: 2; background: #e8b84b; border: none; color: #0e0e0e; border-radius: 7px; padding: 10px; cursor: pointer; font-size: 14px; font-weight: 700; }
  .modal-confirm:hover { opacity: 0.88; }

  .loading { display: flex; align-items: center; justify-content: center; min-height: 200px; color: #555; font-size: 14px; }
</style>
</head>
<body>

<div id="auth-screen">
  <div>
    <div class="logo">Camera Crew</div>
    <div class="app-title">Gear <span>Manifest</span></div>
  </div>
  <button class="sign-in-btn" onclick="signIn()">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
      <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
      <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
      <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
    </svg>
    Sign in with Google
  </button>
</div>

<div id="app">
  <header>
    <div class="header-left">
      <div class="header-title">⬡ Gear Manifest</div>
    </div>
    <div class="user-info">
      <img class="user-avatar" id="user-avatar" src="" alt="">
      <span class="user-name" id="user-name"></span>
      <button class="sign-out-btn" onclick="signOut()">sign out</button>
    </div>
  </header>

  <div class="main">
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-num" id="stat-total">0</div>
        <div class="stat-label">Total Items</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="stat-available" style="color:#5acc8e">0</div>
        <div class="stat-label">Available</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="stat-out" style="color:#e8b84b">0</div>
        <div class="stat-label">Checked Out</div>
      </div>
    </div>

    <div class="section-header">
      <div class="section-title">Equipment</div>
      <button class="add-btn" onclick="openAddModal()">+ Add Gear</button>
    </div>

    <div class="filter-row">
      <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
      <button class="filter-btn" onclick="setFilter('available', this)">Available</button>
      <button class="filter-btn" onclick="setFilter('checked-out', this)">Checked Out</button>
      <button class="filter-btn" onclick="setFilter('Camera Bodies', this)">Bodies</button>
      <button class="filter-btn" onclick="setFilter('Lenses', this)">Lenses</button>
      <button class="filter-btn" onclick="setFilter('Lighting', this)">Lighting</button>
      <button class="filter-btn" onclick="setFilter('Stands & Supports', this)">Stands</button>
      <button class="filter-btn" onclick="setFilter('Other', this)">Other</button>
    </div>

    <div id="gear-grid" class="gear-grid">
      <div class="loading">Loading gear...</div>
    </div>
  </div>
</div>

<!-- Add Gear Modal -->
<div id="add-modal" class="modal-overlay" style="display:none">
  <div class="modal">
    <h3>Add Gear Item</h3>
    <div class="form-group">
      <label>Item Name</label>
      <input type="text" id="gear-name-input" placeholder="e.g. Sony A7 III, 50mm f/1.8">
    </div>
    <div class="form-group">
      <label>Category</label>
      <select id="gear-cat-input">
        <option>Camera Bodies</option>
        <option>Lenses</option>
        <option>Lighting</option>
        <option>Stands & Supports</option>
        <option>Other</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="modal-cancel" onclick="closeModals()">Cancel</button>
      <button class="modal-confirm" onclick="addGear()">Add Item</button>
    </div>
  </div>
</div>

<!-- Take Gear Modal -->
<div id="take-modal" class="modal-overlay" style="display:none">
  <div class="modal">
    <h3>Check Out Gear</h3>
    <p style="font-size:14px;color:#888;margin-bottom:1.25rem" id="take-item-name"></p>
    <div class="form-group">
      <label>Who's taking it?</label>
      <input type="text" id="take-name-input" placeholder="Your name">
    </div>
    <div class="modal-actions">
      <button class="modal-cancel" onclick="closeModals()">Cancel</button>
      <button class="modal-confirm" onclick="confirmTake()">Check Out</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut as fbSignOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getDatabase, ref, push, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAPnYK0aXhdRY_d8farvKqw_i2lOO_5lK8",
  authDomain: "gear-manifest-v2.firebaseapp.com",
  databaseURL: "https://gear-manifest-v2-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "gear-manifest-v2",
  storageBucket: "gear-manifest-v2.firebasestorage.app",
  messagingSenderId: "366870494705",
  appId: "1:366870494705:web:6167d14e290c019869d850"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

let currentFilter = 'all';
let allGear = {};
let pendingTakeId = null;

window.signIn = async () => {
  const provider = new GoogleAuthProvider();
  try { await signInWithPopup(auth, provider); } catch(e) { alert(e.message); }
};

window.signOut = () => fbSignOut(auth);

onAuthStateChanged(auth, user => {
  if (user) {
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    document.getElementById('user-name').textContent = user.displayName?.split(' ')[0] || user.email;
    document.getElementById('user-avatar').src = user.photoURL || '';
    listenGear();
  } else {
    document.getElementById('auth-screen').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
  }
});

function listenGear() {
  const gearRef = ref(db, 'gear');
  onValue(gearRef, snap => {
    allGear = snap.val() || {};
    renderGear();
  });
}

function renderGear() {
  const grid = document.getElementById('gear-grid');
  const items = Object.entries(allGear);

  let filtered = items;
  if (currentFilter === 'available') filtered = items.filter(([,v]) => !v.checkedOutBy);
  else if (currentFilter === 'checked-out') filtered = items.filter(([,v]) => v.checkedOutBy);
  else if (!['all','available','checked-out'].includes(currentFilter)) {
    filtered = items.filter(([,v]) => v.category === currentFilter);
  }

  const total = items.length;
  const available = items.filter(([,v]) => !v.checkedOutBy).length;
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-available').textContent = available;
  document.getElementById('stat-out').textContent = total - available;

  if (filtered.length === 0) {
    grid.innerHTML = `<div class="empty-state"><div style="font-size:2rem">📷</div><p>${total === 0 ? 'No gear yet. Add your first item!' : 'Nothing matches this filter.'}</p></div>`;
    return;
  }

  grid.innerHTML = filtered.map(([id, item]) => `
    <div class="gear-card ${item.checkedOutBy ? 'checked-out' : 'available'}">
      <div class="gear-card-top">
        <div class="gear-name">${escHtml(item.name)}</div>
        <div class="gear-cat">${escHtml(item.category)}</div>
      </div>
      <div class="gear-status">
        ${item.checkedOutBy
          ? `<span class="status-badge checked-out"><span class="status-dot"></span>Out</span>
             <div class="with-who">with <strong>${escHtml(item.checkedOutBy)}</strong></div>`
          : `<span class="status-badge available"><span class="status-dot"></span>Available</span>`}
      </div>
      <div class="gear-actions">
        ${item.checkedOutBy
          ? `<button class="action-btn return" onclick="returnGear('${id}')">Return</button>`
          : `<button class="action-btn take" onclick="openTakeModal('${id}', '${escHtml(item.name)}')">Take</button>`}
        <button class="action-btn del" onclick="deleteGear('${id}')">Remove</button>
      </div>
    </div>
  `).join('');
}

window.openAddModal = () => {
  document.getElementById('add-modal').style.display = 'flex';
  document.getElementById('gear-name-input').focus();
};

window.openTakeModal = (id, name) => {
  pendingTakeId = id;
  document.getElementById('take-item-name').textContent = name;
  document.getElementById('take-name-input').value = '';
  document.getElementById('take-modal').style.display = 'flex';
  document.getElementById('take-name-input').focus();
};

window.closeModals = () => {
  document.getElementById('add-modal').style.display = 'none';
  document.getElementById('take-modal').style.display = 'none';
};

window.addGear = async () => {
  const name = document.getElementById('gear-name-input').value.trim();
  const category = document.getElementById('gear-cat-input').value;
  if (!name) return;
  await push(ref(db, 'gear'), { name, category, checkedOutBy: null, addedAt: Date.now() });
  document.getElementById('gear-name-input').value = '';
  closeModals();
};

window.confirmTake = async () => {
  const who = document.getElementById('take-name-input').value.trim();
  if (!who || !pendingTakeId) return;
  await update(ref(db, `gear/${pendingTakeId}`), { checkedOutBy: who, checkedOutAt: Date.now() });
  pendingTakeId = null;
  closeModals();
};

window.returnGear = id => update(ref(db, `gear/${id}`), { checkedOutBy: null, checkedOutAt: null });

window.deleteGear = id => {
  if (confirm('Remove this item from the manifest?')) remove(ref(db, `gear/${id}`));
};

window.setFilter = (val, btn) => {
  currentFilter = val;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderGear();
};

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModals(); });
</script>
</body>
</html>
